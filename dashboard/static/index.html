<!-- Placeholder UI — replaced by cyberpunk dashboard in next phase -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimir — RF Scanner Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
        integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA=="
        crossorigin="anonymous"></script>
<style>
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: monospace;
    margin: 0;
    padding: 20px;
  }
  .status-bar {
    text-align: right;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.connected { background: #00ff88; }
  .status-dot.disconnected { background: #666; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #333;
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #1a1a1a;
    font-size: 13px;
  }
  tr.high td { color: #00ff88; }
  tr.medium td { color: #ffcc00; }
  tr.low td, tr.novel td { color: #ff4444; }
  .count {
    color: #555;
    font-size: 11px;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span id="statusText">DISCONNECTED</span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Frequency</th>
        <th>Type</th>
        <th>Confidence</th>
        <th>Legal</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  <div class="count" id="rowCount">0 results</div>

  <script>
    const socket = io();
    const tbody = document.getElementById('resultsBody');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const rowCount = document.getElementById('rowCount');
    const MAX_ROWS = 200;

    socket.on('connect', function() {
      statusDot.className = 'status-dot connected';
      statusText.textContent = '● SCANNING';
    });

    socket.on('disconnect', function() {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = '○ DISCONNECTED';
    });

    socket.on('scan_result', function(data) {
      var tr = document.createElement('tr');
      var confidence = data.confidence || 'low';
      var cls = confidence === 'high' ? 'high' : (confidence === 'medium' ? 'medium' : 'low');
      if (data.novel) cls = 'novel';
      tr.className = cls;

      var time = data.timestamp ? data.timestamp.slice(11, 19) : '--';
      var freq = data.center_freq_hz ? (data.center_freq_hz / 1e6).toFixed(3) + ' MHz' : '--';
      var type = data.signal_type || '--';
      var confLabel = (data.confidence_score !== undefined)
        ? confidence + ' ' + data.confidence_score.toFixed(2)
        : confidence;
      var legal = data.au_legal_status || '--';

      tr.innerHTML = '<td>' + time + '</td><td>' + freq + '</td><td>'
        + type + '</td><td>' + confLabel + '</td><td>' + legal + '</td>';
      tbody.insertBefore(tr, tbody.firstChild);

      while (tbody.children.length > MAX_ROWS) {
        tbody.removeChild(tbody.lastChild);
      }
      rowCount.textContent = tbody.children.length + ' results';
    });
  </script>
</body>
</html>
