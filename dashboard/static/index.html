<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimir RF Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="dashboard">
        <!-- Top annotation bar - shows AI classification results -->
        <div id="annotation-bar">
            <div id="annotation">Scanning...</div>
        </div>

        <!-- Band selector buttons -->
        <div id="band-selector">
          <button onclick="setBand('fm_broadcast')" id="btn-fm-broadcast">FM</button>
          <button onclick="setBand('aviation')"     id="btn-aviation">Aviation</button>
          <button onclick="setBand('adsb')"         id="btn-adsb">ADS-B</button>
          <button onclick="setBand('noise_floor')"  id="btn-noise-floor">Noise</button>
        </div>

        <!-- Bottom waterfall canvas - displays spectrum over time -->
        <div id="waterfall-container">
            <canvas id="waterfall"></canvas>
        </div>
    </div>

    <script src="/static/waterfall.js"></script>
</body>
</html>
